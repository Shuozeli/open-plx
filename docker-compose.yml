services:
  # DuckDB Flight SQL server for development/testing
  flight-sql:
    image: voltrondata/flight-sql:latest
    ports:
      - "31337:31337"
    environment:
      TLS_ENABLED: "0"
      FLIGHT_PASSWORD: "test123"
      PRINT_QUERIES: "true"
      INIT_SQL_COMMANDS_FILE: "/opt/flight_sql/seed/init.sql"
    volumes:
      - ./config/seed:/opt/flight_sql/seed

