services:
  # DuckDB Flight SQL server for development/testing
  flight-sql:
    image: voltrondata/flight-sql:latest
    ports:
      - "31337:31337"
    environment:
      TLS_ENABLED: "0"
      FLIGHT_PASSWORD: "test123"
      PRINT_QUERIES: "true"
      INIT_SQL_COMMANDS_FILE: "/opt/flight_sql/seed/init.sql"
    volumes:
      - ./config/seed:/opt/flight_sql/seed

  # PostgreSQL for ADBC integration tests
  postgres:
    image: postgres:16-alpine
    ports:
      - "25432:5432"
    environment:
      POSTGRES_USER: plx_test
      POSTGRES_PASSWORD: plx_test
      POSTGRES_DB: plx_test
    volumes:
      - ./config/seed/postgres-init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U plx_test"]
      interval: 2s
      timeout: 5s
      retries: 10

  # MySQL for ADBC integration tests
  mysql:
    image: mysql:8.0
    ports:
      - "23306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: plx_root
      MYSQL_USER: plx_test
      MYSQL_PASSWORD: plx_test
      MYSQL_DATABASE: plx_test
    volumes:
      - ./config/seed/mysql-init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "plx_test", "-pplx_test"]
      interval: 3s
      timeout: 5s
      retries: 10
