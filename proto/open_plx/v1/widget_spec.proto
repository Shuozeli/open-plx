syntax = "proto3";

package open_plx.v1;

import "open_plx/v1/action.proto";

// -----------------------------------------------------------------------------
// Widget Spec Definitions
//
// SEMANTIC dashboard spec -- NOT a G2/S2 config serialization format.
//
// These protos describe WHAT to visualize in domain terms (time series,
// comparison, distribution, pivot table). The frontend's translation layer
// converts these to the rendering library's native config (currently G2/S2).
//
// This decoupling means:
//   - Upgrading G2 v5 -> v6 only changes the frontend translator, not the proto
//   - Switching to a different chart library is a frontend-only change
//   - Dashboard authors think in data terms, not library terms
//
// Design principles:
//   - No functions/callbacks (not serializable over gRPC)
//   - No visual styling (colors, fonts, opacity -- frontend theme owns these)
//   - No interaction config (hover, click, brush -- frontend owns these)
//   - No container dimensions (derived from grid position at render time)
//   - Format strings instead of formatter functions
//   - Semantic vocabulary: "time_series", "comparison", not "line", "interval"
//
// The frontend merges these specs with theme defaults and translates to G2/S2.
// -----------------------------------------------------------------------------

// Top-level spec: one of the widget type specs.
message WidgetSpec {
  oneof spec {
    ChartSpec chart = 1;
    PivotTableSpec pivot_table = 2;
    MetricCardSpec metric_card = 3;
    TextSpec text = 4;
    TableSpec table = 5;
    GaugeSpec gauge = 6;
    FunnelSpec funnel = 7;
    TreemapSpec treemap = 8;
    SankeySpec sankey = 9;
    WordCloudSpec word_cloud = 10;
    GraphSpec graph = 11;
  }
}

// =============================================================================
// CHART SPEC
//
// Semantic chart description. The frontend translates to G2 v5 marks.
//
// Translation examples:
//   ChartType CHART_TYPE_LINE         -> G2 mark "line"
//   ChartType CHART_TYPE_BAR          -> G2 mark "interval"
//   ChartType CHART_TYPE_PIE          -> G2 mark "interval" + theta coordinate
//   ChartType CHART_TYPE_SCATTER      -> G2 mark "point"
//   ChartType CHART_TYPE_HEATMAP      -> G2 mark "cell"
//   ChartType CHART_TYPE_AREA         -> G2 mark "area"
//   StackMode STACK_MODE_STACKED      -> G2 transform "stackY"
//   StackMode STACK_MODE_GROUPED      -> G2 transform "dodgeX"
//   StackMode STACK_MODE_PERCENT      -> G2 transform "normalizeY"
// =============================================================================

message ChartSpec {
  // What kind of chart to render.
  ChartType chart_type = 1;

  // Data mapping: which Arrow columns map to which visual roles.
  ChartDataMapping data_mapping = 2;

  // How to handle multiple series (stacked, grouped, etc.).
  StackMode stack_mode = 3;

  // Axis configuration.
  AxisConfig x_axis = 4;
  AxisConfig y_axis = 5;

  // Coordinate system overrides (for pie/donut/radar).
  CoordinateConfig coordinate = 6;

  // Data labels.
  repeated LabelConfig labels = 7;

  // Reference lines and bands.
  repeated Annotation annotations = 8;

  // Scale overrides per channel.
  map<string, ScaleConfig> scales = 9;

  // Data transforms (sorting, sampling, binning).
  repeated DataTransform transforms = 10;

  // For composite/layered charts: multiple chart specs overlaid.
  repeated ChartSpec layers = 11;

  // Sort the data before rendering.
  SortConfig sort = 12;

  // Line interpolation shape (for LINE and AREA chart types).
  LineShape line_shape = 13;
}

// Semantic chart types. The frontend maps these to rendering library marks.
enum ChartType {
  CHART_TYPE_UNSPECIFIED = 0;
  CHART_TYPE_LINE = 1;           // Time series, trends
  CHART_TYPE_BAR = 2;            // Comparisons (vertical bars)
  CHART_TYPE_HORIZONTAL_BAR = 3; // Comparisons (horizontal bars)
  CHART_TYPE_PIE = 4;            // Proportions (full circle)
  CHART_TYPE_DONUT = 5;          // Proportions (ring)
  CHART_TYPE_AREA = 6;           // Filled time series
  CHART_TYPE_SCATTER = 7;        // Correlation, distribution
  CHART_TYPE_HEATMAP = 8;        // Matrix density
  CHART_TYPE_HISTOGRAM = 9;      // Distribution
  CHART_TYPE_RADAR = 10;         // Multi-dimensional comparison
  CHART_TYPE_BOX_PLOT = 11;      // Statistical distribution (box + whiskers)
}

// Maps data columns to visual roles (semantic, not library-specific).
message ChartDataMapping {
  // Primary dimension (usually x-axis).
  string x = 1;

  // Primary measure (usually y-axis).
  string y = 2;

  // Grouping / color split dimension.
  string group_by = 3;

  // Size channel (for bubble/scatter).
  string size = 4;

  // Value channel (for pie/donut: the slice size).
  string value = 5;

  // Category channel (for pie/donut: the slice label).
  string category = 6;

  // Text content (for annotation marks).
  string text = 7;
}

// How multiple series are stacked.
enum StackMode {
  STACK_MODE_UNSPECIFIED = 0;     // No stacking (default)
  STACK_MODE_STACKED = 1;        // Values stacked on top of each other
  STACK_MODE_GROUPED = 2;        // Side-by-side grouping
  STACK_MODE_PERCENT = 3;        // Normalized to 100%
}

// Line interpolation shape. Used by LINE and AREA chart types.
enum LineShape {
  LINE_SHAPE_UNSPECIFIED = 0;     // Default: linear
  LINE_SHAPE_LINEAR = 1;          // Straight line segments
  LINE_SHAPE_SMOOTH = 2;          // Curved interpolation
  LINE_SHAPE_STEP = 3;            // Step after point (vertical then horizontal)
  LINE_SHAPE_STEP_BEFORE = 4;     // Step before point (horizontal then vertical)
  LINE_SHAPE_STEP_MIDDLE = 5;     // Step at midpoint
}

// =============================================================================
// AXIS CONFIG
// =============================================================================

message AxisConfig {
  bool hidden = 1;                         // Hide this axis entirely

  string title = 2;                        // Axis title text
  AxisPosition position = 3;

  // Label formatting (D3 format strings, NOT functions).
  // Examples: ".0%" (percentage), "~s" (SI prefix), "$,.2f" (currency)
  string label_format = 4;

  int32 tick_count = 5;

  // Grid lines
  bool grid = 6;

  // Scale type override for this axis.
  ScaleType scale_type = 7;
}

enum AxisPosition {
  AXIS_POSITION_UNSPECIFIED = 0;
  AXIS_POSITION_TOP = 1;
  AXIS_POSITION_BOTTOM = 2;
  AXIS_POSITION_LEFT = 3;
  AXIS_POSITION_RIGHT = 4;
}

// =============================================================================
// SCALE CONFIG
// =============================================================================

message ScaleConfig {
  ScaleType type = 1;

  // Domain bounds
  optional double domain_min = 2;
  optional double domain_max = 3;

  // For categorical scales: explicit domain ordering
  repeated string domain_categories = 4;

  // Range (for size channel)
  optional double range_min = 5;
  optional double range_max = 6;

  bool nice = 7;                           // Round domain to nice values
  bool zero = 8;                           // Include zero in domain

  int32 tick_count = 9;
  string tick_interval = 10;               // For time: "month", "day", "hour"

  // Log/pow specific
  double base = 11;                        // For log (default: 10)
  double exponent = 12;                    // For pow (default: 1)

  // Band/point specific
  double padding = 13;                     // 0-1

  // Color palette name: "reds", "blues", "turbo", "viridis", etc.
  string palette = 14;

  // Explicit color range: ["#ff0000", "#00ff00", "#0000ff"]
  repeated string color_range = 15;
}

enum ScaleType {
  SCALE_TYPE_UNSPECIFIED = 0;
  SCALE_TYPE_LINEAR = 1;
  SCALE_TYPE_LOG = 2;
  SCALE_TYPE_POW = 3;
  SCALE_TYPE_SQRT = 4;
  SCALE_TYPE_TIME = 5;
  SCALE_TYPE_BAND = 6;
  SCALE_TYPE_POINT = 7;
  SCALE_TYPE_ORDINAL = 8;
  SCALE_TYPE_QUANTIZE = 9;
  SCALE_TYPE_QUANTILE = 10;
  SCALE_TYPE_THRESHOLD = 11;
  SCALE_TYPE_SEQUENTIAL = 12;
}

// =============================================================================
// COORDINATE CONFIG
// =============================================================================

message CoordinateConfig {
  optional double inner_radius = 1;        // 0-1 (donut hole size)
  optional double outer_radius = 2;        // 0-1
  optional double start_angle = 3;         // Radians
  optional double end_angle = 4;           // Radians
}

// =============================================================================
// LABEL CONFIG
// =============================================================================

message LabelConfig {
  string field = 1;                        // Column name to display
  LabelPosition position = 2;
  string format = 3;                       // D3 format string
  double offset = 4;                       // Pixel offset from mark
  bool connector = 5;                      // Draw connector line (pie/donut)
  LabelSelector selector = 6;             // Show label for subset only
}

enum LabelPosition {
  LABEL_POSITION_UNSPECIFIED = 0;
  LABEL_POSITION_TOP = 1;
  LABEL_POSITION_BOTTOM = 2;
  LABEL_POSITION_LEFT = 3;
  LABEL_POSITION_RIGHT = 4;
  LABEL_POSITION_INSIDE = 5;
  LABEL_POSITION_OUTSIDE = 6;
}

enum LabelSelector {
  LABEL_SELECTOR_UNSPECIFIED = 0;
  LABEL_SELECTOR_FIRST = 1;
  LABEL_SELECTOR_LAST = 2;
  LABEL_SELECTOR_MIN = 3;
  LABEL_SELECTOR_MAX = 4;
}

// =============================================================================
// ANNOTATION: reference lines and bands
// =============================================================================

message Annotation {
  AnnotationType type = 1;
  double value = 2;                        // Value on the axis (or start for range)
  optional double value_end = 3;           // End value (for RANGE_X, RANGE_Y)
  string label = 4;                        // Annotation label text
}

enum AnnotationType {
  ANNOTATION_TYPE_UNSPECIFIED = 0;
  ANNOTATION_TYPE_LINE_X = 1;              // Vertical reference line
  ANNOTATION_TYPE_LINE_Y = 2;              // Horizontal reference line
  ANNOTATION_TYPE_RANGE_X = 3;             // Vertical band
  ANNOTATION_TYPE_RANGE_Y = 4;             // Horizontal band
}

// =============================================================================
// DATA TRANSFORM
// =============================================================================

message DataTransform {
  DataTransformType type = 1;

  // Bin params
  int32 bin_count = 2;

  // Sample params
  int32 sample_size = 3;
  SampleStrategy sample_strategy = 4;

  // Group aggregate: channel -> aggregation
  // e.g., { "y": "sum" } means aggregate y-values by sum
  map<string, string> aggregations = 5;

  // Group by fields
  repeated string group_by = 6;
}

enum DataTransformType {
  DATA_TRANSFORM_TYPE_UNSPECIFIED = 0;
  DATA_TRANSFORM_TYPE_BIN = 1;            // Create histogram bins
  DATA_TRANSFORM_TYPE_SAMPLE = 2;         // Downsample large datasets
  DATA_TRANSFORM_TYPE_GROUP = 3;          // Group and aggregate
}

enum SampleStrategy {
  SAMPLE_STRATEGY_UNSPECIFIED = 0;
  SAMPLE_STRATEGY_LTTB = 1;
  SAMPLE_STRATEGY_MEDIAN = 2;
  SAMPLE_STRATEGY_MAX = 3;
  SAMPLE_STRATEGY_MIN = 4;
  SAMPLE_STRATEGY_FIRST = 5;
  SAMPLE_STRATEGY_LAST = 6;
}

// =============================================================================
// SORT CONFIG
// =============================================================================

message SortConfig {
  string field = 1;                        // Column to sort by
  SortDirection direction = 2;
  Aggregation reducer = 3;                // For grouped data: sort by aggregate
  optional int32 limit = 4;               // Top N / Bottom N
}

enum SortDirection {
  SORT_DIRECTION_UNSPECIFIED = 0;
  SORT_DIRECTION_ASC = 1;
  SORT_DIRECTION_DESC = 2;
}

enum Aggregation {
  AGGREGATION_UNSPECIFIED = 0;
  AGGREGATION_SUM = 1;
  AGGREGATION_MIN = 2;
  AGGREGATION_MAX = 3;
  AGGREGATION_AVG = 4;
  AGGREGATION_COUNT = 5;
}

// =============================================================================
// PIVOT TABLE SPEC (maps to S2 DataConfig + Options)
// =============================================================================

message PivotTableSpec {
  PivotFields fields = 1;
  repeated FieldMeta meta = 2;
  repeated PivotSortParam sort = 3;
  PivotTotals totals = 4;
  PivotHierarchyType hierarchy_type = 5;
  PivotFrozen frozen = 6;
  PivotPagination pagination = 7;
  PivotSeriesNumber series_number = 8;
  repeated ConditionalFormat conditions = 9;
  TableInteraction interaction = 10;
}

message PivotFields {
  repeated string rows = 1;
  repeated string columns = 2;
  repeated string values = 3;
  bool value_in_cols = 4;
}

message FieldMeta {
  string field = 1;
  string name = 2;                         // Display name / alias
  string description = 3;                  // Tooltip description
  string formatter = 4;                    // Format string (see below)
}

// Format strings (frontend translates to formatter functions):
//   "currency:USD"    -> $1,234.56
//   "currency:EUR"    -> EUR 1,234.56
//   "percent"         -> 45.2%
//   "percent:0"       -> 45%
//   "number:2"        -> 1,234.56
//   "number:0"        -> 1,235
//   "compact"         -> 1.2K, 3.4M

message PivotSortParam {
  string sort_field_id = 1;
  SortDirection sort_direction = 2;
  repeated string sort_by = 3;
  string sort_by_measure = 4;
  map<string, string> query = 5;
}

message PivotTotals {
  PivotTotalConfig row = 1;
  PivotTotalConfig col = 2;
}

message PivotTotalConfig {
  bool show_grand_totals = 1;
  bool show_sub_totals = 2;
  repeated string sub_totals_dimensions = 3;
  string grand_totals_label = 4;
  string sub_totals_label = 5;
  bool reverse_grand_totals_layout = 6;
  bool reverse_sub_totals_layout = 7;
  Aggregation aggregation = 8;
}

enum PivotHierarchyType {
  PIVOT_HIERARCHY_TYPE_UNSPECIFIED = 0;
  PIVOT_HIERARCHY_TYPE_GRID = 1;
  PIVOT_HIERARCHY_TYPE_TREE = 2;
}

message PivotFrozen {
  bool row_header = 1;
  int32 row_count = 2;
  int32 col_count = 3;
  int32 trailing_row_count = 4;
  int32 trailing_col_count = 5;
}

message PivotPagination {
  int32 page_size = 1;
  int32 current = 2;
}

message PivotSeriesNumber {
  bool enable = 1;
  string text = 2;
}

// =============================================================================
// METRIC CARD SPEC
// =============================================================================

message MetricCardSpec {
  string value = 1;                        // Column name (first row used)
  string format = 2;                       // Format string
  MetricComparison comparison = 3;
  Sparkline sparkline = 4;
}

message MetricComparison {
  string value = 1;
  string label = 2;
  ComparisonDirection direction = 3;
}

enum ComparisonDirection {
  COMPARISON_DIRECTION_UNSPECIFIED = 0;
  COMPARISON_DIRECTION_HIGHER_IS_BETTER = 1;
  COMPARISON_DIRECTION_LOWER_IS_BETTER = 2;
}

message Sparkline {
  SparklineType type = 1;
  string x = 2;
  string y = 3;
}

enum SparklineType {
  SPARKLINE_TYPE_UNSPECIFIED = 0;
  SPARKLINE_TYPE_LINE = 1;
  SPARKLINE_TYPE_AREA = 2;
  SPARKLINE_TYPE_BAR = 3;
}

// =============================================================================
// TEXT SPEC
// =============================================================================

message TextSpec {
  string content = 1;
  TextFormat format = 2;
}

enum TextFormat {
  TEXT_FORMAT_UNSPECIFIED = 0;
  TEXT_FORMAT_PLAIN = 1;
  TEXT_FORMAT_MARKDOWN = 2;
}

// =============================================================================
// TABLE SPEC
//
// Flat table (no pivot dimensions). Uses S2 TableSheet.
// =============================================================================

message TableSpec {
  // Columns to display. If empty, all data columns are shown.
  repeated TableColumn columns = 1;

  // Field display names and formatters (same as PivotTableSpec.meta).
  repeated FieldMeta meta = 2;

  // Pagination config. If absent, no pagination.
  TablePagination pagination = 3;

  // Show auto-incrementing row number column.
  bool show_row_numbers = 4;

  repeated ConditionalFormat conditions = 5;
  TableInteraction interaction = 6;

  TableViewConfig view = 7;

  // Columns frozen to the left side (by field name).
  repeated string frozen_cols_left = 8;

  // Columns frozen to the right side (by field name).
  repeated string frozen_cols_right = 9;

  // Default sort: field + direction (applied on initial load).
  TableDefaultSort default_sort = 10;

  // Row selection config.
  TableSelectionConfig selection = 11;

  // Data export config.
  TableExportConfig export = 12;

  // Row expansion / tree table config.
  TableExpandConfig expandable = 13;

  // Cell spanning config.
  repeated TableColSpan col_spans = 14;

  // Server-side pagination. When set, frontend requests one page at a time.
  ServerSidePagination server_pagination = 15;
}

message TableColumn {
  // Data field name.
  string field = 1;

  // Column width in pixels. 0 = auto.
  int32 width = 2;

  // Alignment override.
  TableColumnAlign align = 3;

  bool sortable = 5;
  bool filterable = 6;
  TableFilterConfig filter = 7;

  // Hide this column from display.
  bool hidden = 8;

  // Explicit display order (lower = earlier). 0 = no explicit order.
  int32 order = 9;

  // Cell renderer for this column.
  TableCellRenderer renderer = 10;

  // Row action button for this column.
  TableAction action = 11;
}

// Cell renderer: one of icon, bar, link, progress.
message TableCellRenderer {
  oneof renderer {
    TableCellRendererText text = 1;
    TableCellRendererIcon icon = 2;
    TableCellRendererBar bar = 3;
    TableCellRendererLink link = 4;
    TableCellRendererProgress progress = 5;
  }
}

message TableCellRendererText {
  // Alias for the default (plain text). No extra config.
}

message TableCellRendererIcon {
  // Map cell value -> AntD icon name.
  // Example: { "active": "CheckCircleOutlined", "inactive": "MinusCircleOutlined" }
  map<string, string> value_to_icon = 1;
  // Fallback icon when value doesn't match any key.
  string fallback_icon = 2;
}

message TableCellRendererBar {
  // Numeric field for bar width. If not set, uses the cell value itself.
  string value_field = 1;
  // Maximum value for the bar (for normalization). If not set, uses column max.
  double max_value = 2;
  // Show numeric label next to the bar.
  bool show_label = 3;
  // Bar color (hex color).
  string color = 4;
}

message TableCellRendererLink {
  // URL template. Supports field interpolation: "https://example.com/{id}"
  string url_template = 1;
  // Whether to open in new tab.
  bool new_tab = 2;
}

message TableCellRendererProgress {
  // Field containing the "current" / filled value.
  string value_field = 1;
  // Field containing the "total" value. If not set, max_value is used.
  string total_field = 2;
  // Fixed max if total_field is not set.
  double max_value = 3;
  // Show "current / total" label.
  bool show_label = 4;
}

enum TableColumnAlign {
  TABLE_COLUMN_ALIGN_UNSPECIFIED = 0;
  TABLE_COLUMN_ALIGN_LEFT = 1;
  TABLE_COLUMN_ALIGN_CENTER = 2;
  TABLE_COLUMN_ALIGN_RIGHT = 3;
}

message TablePagination {
  int32 page_size = 1;
}

// Server-side pagination for flat table.
// When set, the frontend requests one page at a time and the backend
// returns only the current page rows plus the total row count.
message ServerSidePagination {
  // Default page size. Frontend sends page number (1-based) in
  // WidgetDataRequest.params.
  int32 page_size = 1;
  // Whether to show total row count in the UI.
  bool show_total_count = 2;
  // Whether to show page size selector (10, 25, 50, 100).
  bool show_page_size_selector = 3;
}

message TableViewConfig {
  bool enable_search = 1;
  string search_placeholder = 2;
  bool case_sensitive = 3;
  repeated string search_fields = 4;
}

// Default sort applied on initial table load.
message TableDefaultSort {
  string field = 1;
  SortDirection direction = 2;
}

message TableFilterConfig {
  TableFilterType type = 1;
  repeated string filter_values = 2;
}

enum TableFilterType {
  TABLE_FILTER_TYPE_UNSPECIFIED = 0;
  TABLE_FILTER_TYPE_LIST = 1;
  TABLE_FILTER_TYPE_TEXT = 2;
  TABLE_FILTER_TYPE_RANGE = 3;
}

// Row selection config for flat table.
message TableSelectionConfig {
  // Enable row selection (checkbox column).
  bool enabled = 1;

  // Only one row selectable at a time.
  bool single = 2;

  // Whether selection persists when user navigates to another page.
  bool persistent = 3;
}

// Data export config for flat table.
message TableExportConfig {
  // Enable CSV export via S2's built-in export.
  bool enable_csv = 1;

  // Enable Excel export via S2's built-in export.
  bool enable_excel = 2;

  // Custom filename template (without extension).
  string filename_template = 3;
}

// Row expansion / tree table config.
message TableExpandConfig {
  // Enable expandable/collapsible rows.
  bool enabled = 1;
  // The field that uniquely identifies a row (for expansion state).
  string row_id_field = 2;
  // Fields that act as hierarchy levels (for tree table layout).
  repeated string hierarchy_fields = 3;
  // Whether to expand all rows by default.
  bool default_expanded = 4;
}

// Cell spanning config.
message TableColSpan {
  // Field (column) to apply spanning to.
  string field = 1;
  // Condition: a CEL expression evaluated per row.
  // If true, the cell spans `col_span` columns.
  string condition = 2;
  // How many columns to span.
  int32 col_span = 3;
}

// =============================================================================
// GAUGE SPEC
//
// Radial gauge / speedometer. Value mapped to an arc with color ranges.
// =============================================================================

message GaugeSpec {
  string value_field = 1;         // Column containing the gauge value
  double min = 2;                 // Minimum value (default 0)
  double max = 3;                 // Maximum value (default 100)
  string format = 4;              // Display format for the center label
  repeated GaugeRange ranges = 5; // Color bands
}

message GaugeRange {
  double from = 1;
  double to = 2;
  string color = 3;               // Hex color
}

// =============================================================================
// FUNNEL SPEC
//
// Conversion funnel. Stages rendered as narrowing bars.
// =============================================================================

message FunnelSpec {
  string category_field = 1;      // Stage name field (ordered)
  string value_field = 2;         // Numeric value per stage
  bool show_conversion_rate = 3;  // Show % between stages
  FunnelShape shape = 4;
}

enum FunnelShape {
  FUNNEL_SHAPE_UNSPECIFIED = 0;
  FUNNEL_SHAPE_FUNNEL = 1;
  FUNNEL_SHAPE_PYRAMID = 2;
}

// =============================================================================
// TREEMAP SPEC
//
// Hierarchical treemap. Flat data is grouped by hierarchy_fields into a tree.
// =============================================================================

message TreemapSpec {
  string value_field = 1;              // Numeric field for rectangle area
  repeated string hierarchy_fields = 2; // Grouping fields, e.g. ["region", "country"]
  string color_field = 3;              // Optional field for color encoding
  bool show_labels = 4;
}

// =============================================================================
// SANKEY SPEC
//
// Flow/Sankey diagram. Data has source, target, value columns.
// =============================================================================

message SankeySpec {
  string source_field = 1;
  string target_field = 2;
  string value_field = 3;
}

// =============================================================================
// WORD CLOUD SPEC
// =============================================================================

message WordCloudSpec {
  string text_field = 1;           // Word/text field
  string weight_field = 2;         // Numeric weight/frequency field
  int32 max_words = 3;            // Max words to display (0 = unlimited)
  repeated int32 font_size_range = 4; // [min, max] font size, e.g. [12, 60]
}

// =============================================================================
// CONDITIONAL FORMATTING
//
// Declarative conditions for S2 cell styling. The frontend mapper translates
// threshold rules into S2 condition mapping functions at runtime.
// =============================================================================

enum ConditionalFormatType {
  CONDITIONAL_FORMAT_TYPE_UNSPECIFIED = 0;
  CONDITIONAL_FORMAT_TYPE_TEXT = 1;        // Font color/size
  CONDITIONAL_FORMAT_TYPE_BACKGROUND = 2;  // Cell background color
  CONDITIONAL_FORMAT_TYPE_ICON = 3;        // Status icon in cell
  CONDITIONAL_FORMAT_TYPE_INTERVAL = 4;    // Data bar (mini bar chart)
}

enum ComparisonOp {
  COMPARISON_OP_UNSPECIFIED = 0;
  COMPARISON_OP_GT = 1;
  COMPARISON_OP_GTE = 2;
  COMPARISON_OP_LT = 3;
  COMPARISON_OP_LTE = 4;
  COMPARISON_OP_EQ = 5;
  COMPARISON_OP_NEQ = 6;
  COMPARISON_OP_BETWEEN = 7;
}

message ConditionalThreshold {
  ComparisonOp op = 1;
  double value = 2;
  optional double value_end = 3;  // For BETWEEN
  string color = 4;               // Hex color for text/background/interval
  string icon = 5;                // Icon name for ICON type
}

message ConditionalFormat {
  string field = 1;
  ConditionalFormatType type = 2;
  repeated ConditionalThreshold thresholds = 3;
  optional double interval_min = 4;  // For INTERVAL type: min value
  optional double interval_max = 5;  // For INTERVAL type: max value
}

// =============================================================================
// TABLE INTERACTION CONFIG
// =============================================================================

message TableInteraction {
  bool enable_copy = 1;
  bool enable_hover_highlight = 2;
  bool enable_resize = 3;
  bool enable_multi_selection = 4;
  bool enable_range_selection = 5;
  bool enable_column_drag = 6;
}

// =============================================================================
// GRAPH SPEC
//
// Graph / network widget using AntV G6. Data has source, target, value columns.
// =============================================================================

message GraphSpec {
  // Data source mapping: which columns map to source/target/value.
  GraphDataMapping data_mapping = 1;

  // Visual layout.
  GraphLayout layout = 2;

  // Node appearance.
  GraphNodeStyle node_style = 3;

  // Edge appearance.
  GraphEdgeStyle edge_style = 4;

  // Interaction config.
  GraphInteraction interaction = 5;
}

message GraphDataMapping {
  // Field containing source node id.
  string source_field = 1;
  // Field containing target node id.
  string target_field = 2;
  // Field containing edge weight/value (optional).
  string value_field = 3;
  // Field containing node label (optional, falls back to source/target id).
  string label_field = 4;
  // Field containing node group/category (for color encoding).
  string group_field = 5;
}

message GraphLayout {
  GraphLayoutType type = 1;
  // For force-directed: number of iterations.
  int32 iterations = 2;
  // For dagre: direction (TB, LR, RL, BT).
  string direction = 3;
  // Node separation in pixels.
  int32 node_spacing = 4;
  // Rank separation in pixels.
  int32 rank_spacing = 5;
}

enum GraphLayoutType {
  GRAPH_LAYOUT_TYPE_UNSPECIFIED = 0;
  GRAPH_LAYOUT_TYPE_FORCE = 1;       // Force-directed (d3-force)
  GRAPH_LAYOUT_TYPE_DAGRE = 2;       // Directed acyclic graph
  GRAPH_LAYOUT_TYPE_CIRCULAR = 3;     // Circular layout
  GRAPH_LAYOUT_TYPE_GRID = 4;        // Grid layout
  GRAPH_LAYOUT_TYPE_CONCENTRIC = 5;  // Concentric circles by centrality
}

message GraphNodeStyle {
  // Fixed node size in pixels (default 20).
  double size = 1;
  // Default node color.
  string color = 2;
  // Show node labels.
  bool show_label = 3;
  // Label font size in pixels.
  int32 label_font_size = 4;
  // Node border color.
  string border_color = 5;
  // Node border width.
  double border_width = 6;
}

message GraphEdgeStyle {
  // Edge color.
  string color = 1;
  // Fixed edge width in pixels.
  double width = 2;
  // Edge style (solid/dashed/dotted).
  string style = 3;
  // Show arrow heads for directed edges.
  bool show_arrow = 4;
  // Arrow size.
  double arrow_size = 5;
}

message GraphInteraction {
  // Enable drag nodes.
  bool enable_drag = 1;
  // Enable zoom and pan.
  bool enable_zoom = 2;
  // Enable node click to trigger cross-widget interaction.
  bool enable_click_select = 3;
  // Enable hover tooltip.
  bool enable_tooltip = 4;
  // Enable edge click.
  bool enable_edge_click = 5;
}
