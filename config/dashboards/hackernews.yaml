name: dashboards/hackernews
title: Hacker News Trends
description: "12 months of top HN stories: trends, domains, authors, and activity patterns"

grid:
  columns: 24
  row_height: 40
  gap: 8

widgets:
  # Row 0: Metric cards
  - id: total-stories
    widget_type: WIDGET_TYPE_METRIC_CARD
    title: Total Stories
    position: { x: 0, y: 0, w: 6, h: 4 }
    data_source:
      data_source: dataSources/hn-summary
      params: {}
    spec:
      metric_card:
        value: total_stories
        format: "compact"

  - id: avg-points
    widget_type: WIDGET_TYPE_METRIC_CARD
    title: Avg Points
    position: { x: 6, y: 0, w: 6, h: 4 }
    data_source:
      data_source: dataSources/hn-summary
      params: {}
    spec:
      metric_card:
        value: avg_points
        format: "number:0"

  - id: avg-comments
    widget_type: WIDGET_TYPE_METRIC_CARD
    title: Avg Comments
    position: { x: 12, y: 0, w: 6, h: 4 }
    data_source:
      data_source: dataSources/hn-summary
      params: {}
    spec:
      metric_card:
        value: avg_comments
        format: "number:0"

  - id: max-points
    widget_type: WIDGET_TYPE_METRIC_CARD
    title: Top Score
    position: { x: 18, y: 0, w: 6, h: 4 }
    data_source:
      data_source: dataSources/hn-summary
      params: {}
    spec:
      metric_card:
        value: max_points
        format: "compact"

  # Row 4: Stories per month (line chart)
  - id: stories-by-month
    widget_type: WIDGET_TYPE_LINE_CHART
    title: Stories Per Month
    position: { x: 0, y: 4, w: 16, h: 8 }
    data_source:
      data_source: dataSources/hn-stories-by-month
      params: {}
    spec:
      chart:
        chart_type: CHART_TYPE_LINE
        data_mapping:
          x: created_month
          y: story_count
        x_axis:
          title: Month
        y_axis:
          title: Stories

  # Row 4: Story types (pie chart)
  - id: by-type
    widget_type: WIDGET_TYPE_PIE_CHART
    title: Story Types
    position: { x: 16, y: 4, w: 8, h: 8 }
    data_source:
      data_source: dataSources/hn-by-type
      params: {}
    spec:
      chart:
        chart_type: CHART_TYPE_DONUT
        data_mapping:
          value: count
          category: story_type

  # Row 12: Top domains (bar chart)
  - id: top-domains
    widget_type: WIDGET_TYPE_BAR_CHART
    title: Top Domains
    position: { x: 0, y: 12, w: 12, h: 10 }
    data_source:
      data_source: dataSources/hn-top-domains
      params: {}
    spec:
      chart:
        chart_type: CHART_TYPE_HORIZONTAL_BAR
        data_mapping:
          x: domain
          y: story_count
        y_axis:
          title: Stories

  # Row 12: Activity by weekday (bar chart)
  - id: by-weekday
    widget_type: WIDGET_TYPE_BAR_CHART
    title: Activity by Weekday
    position: { x: 12, y: 12, w: 12, h: 10 }
    data_source:
      data_source: dataSources/hn-by-weekday
      params: {}
    spec:
      chart:
        chart_type: CHART_TYPE_BAR
        data_mapping:
          x: weekday
          y: count
        x_axis:
          title: Day
        y_axis:
          title: Stories

  # Row 22: Top authors (pivot table)
  - id: top-authors
    widget_type: WIDGET_TYPE_PIVOT_TABLE
    title: Top Authors
    position: { x: 0, y: 22, w: 24, h: 10 }
    data_source:
      data_source: dataSources/hn-top-authors
      params: {}
    spec:
      pivot_table:
        fields:
          rows: ["author"]
          columns: []
          values: ["story_count", "total_points", "avg_points", "top_score"]
          value_in_cols: true
        meta:
          - field: story_count
            name: Stories
          - field: total_points
            name: Total Points
            formatter: "compact"
          - field: avg_points
            name: Avg Points
          - field: top_score
            name: Top Score

  # Row 32: Heatmap (weekday x hour)
  - id: activity-heatmap
    widget_type: WIDGET_TYPE_HEATMAP
    title: Activity Heatmap (Weekday x Hour)
    position: { x: 0, y: 32, w: 14, h: 10 }
    data_source:
      data_source: dataSources/hn-by-hour
      params: {}
    spec:
      chart:
        chart_type: CHART_TYPE_HEATMAP
        data_mapping:
          x: hour
          y: weekday
          group_by: count

  # Row 32: Radar (story type comparison)
  - id: type-radar
    widget_type: WIDGET_TYPE_RADAR_CHART
    title: Story Type Comparison
    position: { x: 14, y: 32, w: 10, h: 10 }
    data_source:
      data_source: dataSources/hn-type-radar
      params: {}
    spec:
      chart:
        chart_type: CHART_TYPE_RADAR
        data_mapping:
          x: metric
          y: value
          group_by: story_type

  # Row 42: Domain treemap and word cloud
  - id: domain-treemap
    widget_type: WIDGET_TYPE_TREEMAP
    title: Domains by Total Points
    position: { x: 0, y: 42, w: 12, h: 10 }
    data_source:
      data_source: dataSources/hn-domain-treemap
      params: {}
    spec:
      treemap:
        value_field: total_points
        hierarchy_fields: ["domain"]
        show_labels: true

  - id: title-wordcloud
    widget_type: WIDGET_TYPE_WORD_CLOUD
    title: Title Keywords
    position: { x: 12, y: 42, w: 12, h: 10 }
    data_source:
      data_source: dataSources/hn-title-words
      params: {}
    spec:
      word_cloud:
        text_field: word
        weight_field: frequency
        max_words: 80
        font_size_range: [12, 56]

  # Row 52: Top stories flat table
  - id: top-stories-table
    widget_type: WIDGET_TYPE_TABLE
    title: Top 50 Stories
    position: { x: 0, y: 52, w: 24, h: 12 }
    data_source:
      data_source: dataSources/hn-top-stories
      params: {}
    spec:
      table:
        columns:
          - { field: title }
          - { field: author }
          - { field: domain }
          - { field: points }
          - { field: num_comments }
          - { field: created_date }
        meta:
          - field: points
            name: Points
          - field: num_comments
            name: Comments
          - field: created_date
            name: Date
